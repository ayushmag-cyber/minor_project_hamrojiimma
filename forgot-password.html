<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - HamroJiimma</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/boxicons@latest/css/boxicons.min.css">
</head>

<body>

<div class="wrapper-login">

    <h2>Forgot Password</h2>

    <form id="forgot-form">

        <div class="input-box">
            <span class="icon">
                <i class='bx bx-envelope'></i>
            </span>

            <input type="email" id="email" placeholder="Enter your registered email" required>
        </div>

        <button type="submit" class="btn">
            Send Reset Link
        </button>

        <div id="message" style="margin-top:15px;text-align:center;font-weight:bold;"></div>

        <div class="register-link">
            <p>
                <a href="login.html">← Back to Login</a>
            </p>
        </div>

    </form>

</div>

<script>
document.getElementById("forgot-form").addEventListener("submit", function(e){

    e.preventDefault();

    document.getElementById("message").style.color="green";
    document.getElementById("message").innerHTML =
    "Password reset link sent successfully! (Demo)";
});
</script>

</body>
</html>
